---
# =============================================================================
# GitLab CI/CD Pipeline — PingOne IDP Terraform Management
# Linux GitLab Runner | On-Premises Vault | GitLab-managed Terraform State
# =============================================================================

include:
  - local: .gitlab/ci/templates/validate.yml
  - local: .gitlab/ci/templates/apply.yml
  - local: .gitlab/ci/templates/destroy.yml

stages:
  - validate
  - plan
  - apply_dev
  - apply_qa
  - apply_uat
  - apply_prod
  - destroy

variables:
  TF_ROOT: "${CI_PROJECT_DIR}/terraform"
  TF_VERSION: "1.8.0"
  VAULT_ADDR: "http://vault.internal:8200"
  VAULT_ROLE_ID: "${VAULT_ROLE_ID}"         # Set in GitLab CI/CD Variables (plain)
  VAULT_SECRET_ID: "${VAULT_SECRET_ID}"     # Set in GitLab CI/CD Variables (masked)
  # GitLab Terraform state — CI_JOB_TOKEN authenticates automatically
  TF_STATE_BASE: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state"
  TF_HTTP_USERNAME: "gitlab-ci-token"
  TF_HTTP_PASSWORD: "${CI_JOB_TOKEN}"
  TF_HTTP_LOCK_METHOD: "POST"
  TF_HTTP_UNLOCK_METHOD: "DELETE"
  TF_HTTP_RETRY_WAIT_MIN: "5"
  TF_LOG: ""
  TF_IN_AUTOMATION: "true"

# Shared defaults for all jobs on Linux runner
default:
  tags:
    - linux
    - terraform
    - pingone
  before_script:
    - 'echo "Runner: $(hostname) | Job: $CI_JOB_NAME | Env: $CI_ENVIRONMENT_NAME"'
  interruptible: true

# =============================================================================
# STAGE 1: VALIDATE
# =============================================================================

tf_format:
  stage: validate
  <<: *validate_template
  allow_failure: true

tf_validate:
  stage: validate
  <<: *validate_template
  allow_failure: false

tf_lint:
  stage: validate
  <<: *validate_template
  allow_failure: true

# Validation on pull request creation
validate_pr:
  stage: validate
  <<: *validate_template
  only:
    - merge_requests
  allow_failure: false

tf_security_scan:
  stage: validate
  script:
    - echo "Running Checkov security scan..."
    - checkov --directory $TF_ROOT --framework terraform --output cli --quiet
  allow_failure: true

veracode_scan:
  stage: validate
  image: veracode/api-signing:latest
  script:
    - echo "Preparing Veracode scan..."
    - cd $TF_ROOT
    - |
      jarsigner -version 2>/dev/null || \
      echo "Note: Java/jarsigner may be required for some Veracode scans"
    - echo "Submitting Terraform code for Veracode analysis..."
    - |
      curl -s https://api.veracode.com/srcclr/v3/projects \
        -H "VERACODE_API_ID: $VERACODE_API_ID" \
        -H "VERACODE_API_KEY: $VERACODE_API_KEY" \
        -H "Content-Type: application/json" \
        -d "{\"name\": \"terraform-pingone-${CI_COMMIT_SHORT_SHA}\"}" \
        || echo "Veracode credentials not configured; scan skipped"
    - echo "Veracode scan submitted (if credentials configured)."
  allow_failure: true
  only:
    - main
    - merge_requests

# Scheduled drift detection (runs on schedule trigger only)
drift_detection:
  stage: validate
  script:
    - echo "Running drift detection for prod..."
    - source "${CI_PROJECT_DIR}/scripts/fetch-secrets.sh" "prod" "$VAULT_ADDR" "$VAULT_ROLE_ID" "$VAULT_SECRET_ID"
    - bash "${CI_PROJECT_DIR}/scripts/drift-detection.sh" "prod"
  only:
    - schedules
  allow_failure: true

# =============================================================================
# STAGE 2: PLAN
# =============================================================================

.plan_template: &plan_template
  stage: plan
  script:
    - echo "Fetching secrets from vault for $ENVIRONMENT..."
    - source "${CI_PROJECT_DIR}/scripts/fetch-secrets.sh" "$ENVIRONMENT" "$VAULT_ADDR" "$VAULT_ROLE_ID" "$VAULT_SECRET_ID"
    - cd $TF_ROOT
    - echo "Initialising Terraform backend for $ENVIRONMENT..."
    - |
      terraform init \
        -backend-config="address=$TF_STATE_BASE/pingone-$ENVIRONMENT" \
        -backend-config="lock_address=$TF_STATE_BASE/pingone-$ENVIRONMENT/lock" \
        -backend-config="unlock_address=$TF_STATE_BASE/pingone-$ENVIRONMENT/lock" \
        -input=false -reconfigure
    - echo "Generating plan for $ENVIRONMENT..."
    - |
      terraform plan \
        -var-file="${CI_PROJECT_DIR}/environments/$ENVIRONMENT.tfvars" \
        -out="${CI_PROJECT_DIR}/tfplan-$ENVIRONMENT.tfplan" \
        -input=false \
        -lock=true
    - terraform show -json "${CI_PROJECT_DIR}/tfplan-$ENVIRONMENT.tfplan" > "${CI_PROJECT_DIR}/tfplan-$ENVIRONMENT.json"
  artifacts:
    paths:
      - "tfplan-*.tfplan"
      - "tfplan-*.json"
    expire_in: 7 days
  retry:
    max: 2
    when: runner_system_failure

plan_dev:
  <<: *plan_template
  variables:
    ENVIRONMENT: "dev"

plan_qa:
  <<: *plan_template
  variables:
    ENVIRONMENT: "qa"
  only:
    - main
    - merge_requests

plan_uat:
  <<: *plan_template
  variables:
    ENVIRONMENT: "uat"
  only:
    - main

plan_prod:
  <<: *plan_template
  variables:
    ENVIRONMENT: "prod"
  only:
    - main
    - tags

# =============================================================================
# STAGE 3: APPLY DEV (auto on any branch)
# =============================================================================

apply_dev:
  stage: apply_dev
  <<: *apply_template
  variables:
    ENVIRONMENT: "dev"
  when: on_success
  needs: ["plan_dev", "tf_validate"]
  environment:
    name: dev
    action: start

# =============================================================================
# STAGE 4: APPLY QA (auto on merge to main)
# =============================================================================

apply_qa:
  stage: apply_qa
  <<: *apply_template
  variables:
    ENVIRONMENT: "qa"
  when: never
  needs: ["apply_dev", "plan_qa"]
  environment:
    name: qa
    action: start
  only:
    - main

# =============================================================================
# STAGE 5: APPLY UAT (manual approval, main only)
# =============================================================================

apply_uat:
  stage: apply_uat
  <<: *apply_template
  variables:
    ENVIRONMENT: "uat"
  when: never
  needs: ["apply_qa", "plan_uat"]
  environment:
    name: uat
    action: start
  only:
    - main

# =============================================================================
# STAGE 6: APPLY PROD (manual approval + tag or main)
# =============================================================================

apply_prod:
  stage: apply_prod
  script:
    - echo "Pre-production drift check..."
    - source "${CI_PROJECT_DIR}/scripts/fetch-secrets.sh" "prod" "$VAULT_ADDR" "$VAULT_ROLE_ID" "$VAULT_SECRET_ID"
    - bash "${CI_PROJECT_DIR}/scripts/drift-detection.sh" "prod"
    - cd $TF_ROOT
    - |
      terraform init \
        -backend-config="address=$TF_STATE_BASE/pingone-prod" \
        -backend-config="lock_address=$TF_STATE_BASE/pingone-prod/lock" \
        -backend-config="unlock_address=$TF_STATE_BASE/pingone-prod/lock" \
        -input=false -reconfigure
    - echo "Applying to PROD (tag=$CI_COMMIT_TAG)..."
    - |
      terraform apply -auto-approve \
        -var-file="${CI_PROJECT_DIR}/environments/prod.tfvars" \
        -input=false -lock=true -lock-timeout=10m
    - echo "PROD deployment complete."
  when: never
  needs: ["apply_uat", "plan_prod"]
  resource_group: terraform-prod
  only:
    - main
    - tags
  environment:
    name: production
    action: start
  retry:
    max: 1

# =============================================================================
# STAGE 7: DESTROY TEMPLATE (Reusable for dev/qa only — never prod via pipeline)
# =============================================================================
# STAGE 7: DESTROY (manual, dev/qa only — never prod via pipeline)
# =============================================================================

destroy_dev:
  <<: *destroy_template
  variables:
    ENVIRONMENT: "dev"
  needs: ["apply_dev"]
  environment:
    name: dev
    action: stop

destroy_qa:
  <<: *destroy_template
  variables:
    ENVIRONMENT: "qa"
  needs: ["apply_qa"]
  environment:
    name: qa
    action: stop
