---
# =============================================================================
# GitLab CI/CD Pipeline — PingOne IDP Terraform Management
# Linux GitLab Runner | On-Premises Vault | GitLab-managed Terraform State
# =============================================================================

stages:
  - validate
  - plan
  - apply_dev
  - apply_qa
  - apply_uat
  - apply_prod
  - destroy

variables:
  TF_ROOT: "${CI_PROJECT_DIR}/terraform"
  TF_VERSION: "1.8.0"
  VAULT_ADDR: "http://vault.internal:8200"
  VAULT_ROLE_ID: "${VAULT_ROLE_ID}"         # Set in GitLab CI/CD Variables (plain)
  VAULT_SECRET_ID: "${VAULT_SECRET_ID}"     # Set in GitLab CI/CD Variables (masked)
  # GitLab Terraform state — CI_JOB_TOKEN authenticates automatically
  TF_STATE_BASE: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state"
  TF_HTTP_USERNAME: "gitlab-ci-token"
  TF_HTTP_PASSWORD: "${CI_JOB_TOKEN}"
  TF_HTTP_LOCK_METHOD: "POST"
  TF_HTTP_UNLOCK_METHOD: "DELETE"
  TF_HTTP_RETRY_WAIT_MIN: "5"
  TF_LOG: ""
  TF_IN_AUTOMATION: "true"

# Shared defaults for all jobs on Linux runner
default:
  tags:
    - linux
    - terraform
    - pingone
  before_script:
    - echo "Runner: $(hostname) | Job: $CI_JOB_NAME | Env: $CI_ENVIRONMENT_NAME"
  interruptible: true

# =============================================================================
# STAGE 1: VALIDATE
# =============================================================================

tf_format:
  stage: validate
  script:
    - echo "Checking Terraform format..."
    - cd $TF_ROOT
    - terraform fmt -check -recursive -diff
  allow_failure: true

tf_validate:
  stage: validate
  script:
    - echo "Initialising Terraform (no backend)..."
    - cd $TF_ROOT
    - terraform init -backend=false -input=false
    - echo "Validating Terraform configuration..."
    - terraform validate
  allow_failure: false
  artifacts:
    when: always
    expire_in: 7 days

tf_lint:
  stage: validate
  script:
    - echo "Running TFLint..."
    - cd $TF_ROOT
    - tflint --init --config="${CI_PROJECT_DIR}/.tflint.hcl"
    - tflint --config="${CI_PROJECT_DIR}/.tflint.hcl" --format compact
  allow_failure: true
  artifacts:
    when: always
    expire_in: 7 days

tf_security_scan:
  stage: validate
  script:
    - echo "Running Checkov security scan..."
    - checkov --directory $TF_ROOT --framework terraform --output cli --quiet
  allow_failure: true

# Scheduled drift detection (runs on schedule trigger only)
drift_detection:
  stage: validate
  script:
    - echo "Running drift detection for prod..."
    - source "${CI_PROJECT_DIR}/scripts/fetch-secrets.sh" "prod" "$VAULT_ADDR" "$VAULT_ROLE_ID" "$VAULT_SECRET_ID"
    - bash "${CI_PROJECT_DIR}/scripts/drift-detection.sh" "prod"
  only:
    - schedules
  allow_failure: true

# =============================================================================
# STAGE 2: PLAN
# =============================================================================

.plan_template: &plan_template
  stage: plan
  script:
    - echo "Fetching secrets from vault for $ENVIRONMENT..."
    - source "${CI_PROJECT_DIR}/scripts/fetch-secrets.sh" "$ENVIRONMENT" "$VAULT_ADDR" "$VAULT_ROLE_ID" "$VAULT_SECRET_ID"
    - cd $TF_ROOT
    - echo "Initialising Terraform backend for $ENVIRONMENT..."
    - |
      terraform init \
        -backend-config="address=$TF_STATE_BASE/pingone-$ENVIRONMENT" \
        -backend-config="lock_address=$TF_STATE_BASE/pingone-$ENVIRONMENT/lock" \
        -backend-config="unlock_address=$TF_STATE_BASE/pingone-$ENVIRONMENT/lock" \
        -input=false -reconfigure
    - echo "Generating plan for $ENVIRONMENT..."
    - |
      terraform plan \
        -var-file="${CI_PROJECT_DIR}/environments/$ENVIRONMENT.tfvars" \
        -out="${CI_PROJECT_DIR}/tfplan-$ENVIRONMENT.tfplan" \
        -input=false \
        -lock=true
    - terraform show -json "${CI_PROJECT_DIR}/tfplan-$ENVIRONMENT.tfplan" > "${CI_PROJECT_DIR}/tfplan-$ENVIRONMENT.json"
  artifacts:
    paths:
      - "tfplan-*.tfplan"
      - "tfplan-*.json"
    expire_in: 7 days
  retry:
    max: 2
    when: runner_system_failure

plan_dev:
  <<: *plan_template
  variables:
    ENVIRONMENT: "dev"

plan_qa:
  <<: *plan_template
  variables:
    ENVIRONMENT: "qa"
  only:
    - main
    - merge_requests

plan_uat:
  <<: *plan_template
  variables:
    ENVIRONMENT: "uat"
  only:
    - main

plan_prod:
  <<: *plan_template
  variables:
    ENVIRONMENT: "prod"
  only:
    - main
    - tags

# =============================================================================
# STAGE 3: APPLY DEV (auto on any branch)
# =============================================================================

apply_dev:
  stage: apply_dev
  script:
    - echo "Deploying to DEV..."
    - source "${CI_PROJECT_DIR}/scripts/fetch-secrets.sh" "dev" "$VAULT_ADDR" "$VAULT_ROLE_ID" "$VAULT_SECRET_ID"
    - cd $TF_ROOT
    - |
      terraform init \
        -backend-config="address=$TF_STATE_BASE/pingone-dev" \
        -backend-config="lock_address=$TF_STATE_BASE/pingone-dev/lock" \
        -backend-config="unlock_address=$TF_STATE_BASE/pingone-dev/lock" \
        -input=false -reconfigure
    - |
      terraform apply -auto-approve \
        -var-file="${CI_PROJECT_DIR}/environments/dev.tfvars" \
        -input=false -lock=true -lock-timeout=5m
    - echo "DEV deployment complete."
  when: on_success
  needs: ["plan_dev", "tf_validate"]
  resource_group: terraform-dev
  environment:
    name: dev
    action: start
  retry:
    max: 1
    when: runner_system_failure

# =============================================================================
# STAGE 4: APPLY QA (auto on merge to main)
# =============================================================================

apply_qa:
  stage: apply_qa
  script:
    - echo "Deploying to QA..."
    - source "${CI_PROJECT_DIR}/scripts/fetch-secrets.sh" "qa" "$VAULT_ADDR" "$VAULT_ROLE_ID" "$VAULT_SECRET_ID"
    - cd $TF_ROOT
    - |
      terraform init \
        -backend-config="address=$TF_STATE_BASE/pingone-qa" \
        -backend-config="lock_address=$TF_STATE_BASE/pingone-qa/lock" \
        -backend-config="unlock_address=$TF_STATE_BASE/pingone-qa/lock" \
        -input=false -reconfigure
    - |
      terraform apply -auto-approve \
        -var-file="${CI_PROJECT_DIR}/environments/qa.tfvars" \
        -input=false -lock=true -lock-timeout=5m
    - echo "QA deployment complete."
  when: on_success
  needs: ["apply_dev", "plan_qa"]
  resource_group: terraform-qa
  only:
    - main
  environment:
    name: qa
    action: start
  retry:
    max: 1

# =============================================================================
# STAGE 5: APPLY UAT (manual approval, main only)
# =============================================================================

apply_uat:
  stage: apply_uat
  script:
    - echo "Deploying to UAT..."
    - source "${CI_PROJECT_DIR}/scripts/fetch-secrets.sh" "uat" "$VAULT_ADDR" "$VAULT_ROLE_ID" "$VAULT_SECRET_ID"
    - cd $TF_ROOT
    - |
      terraform init \
        -backend-config="address=$TF_STATE_BASE/pingone-uat" \
        -backend-config="lock_address=$TF_STATE_BASE/pingone-uat/lock" \
        -backend-config="unlock_address=$TF_STATE_BASE/pingone-uat/lock" \
        -input=false -reconfigure
    - |
      terraform apply -auto-approve \
        -var-file="${CI_PROJECT_DIR}/environments/uat.tfvars" \
        -input=false -lock=true -lock-timeout=5m
    - echo "UAT deployment complete."
  when: manual
  needs: ["apply_qa", "plan_uat"]
  resource_group: terraform-uat
  only:
    - main
  environment:
    name: uat
    action: start
  retry:
    max: 1

# =============================================================================
# STAGE 6: APPLY PROD (manual approval + tag or main)
# =============================================================================

apply_prod:
  stage: apply_prod
  script:
    - echo "Pre-production drift check..."
    - source "${CI_PROJECT_DIR}/scripts/fetch-secrets.sh" "prod" "$VAULT_ADDR" "$VAULT_ROLE_ID" "$VAULT_SECRET_ID"
    - bash "${CI_PROJECT_DIR}/scripts/drift-detection.sh" "prod"
    - cd $TF_ROOT
    - |
      terraform init \
        -backend-config="address=$TF_STATE_BASE/pingone-prod" \
        -backend-config="lock_address=$TF_STATE_BASE/pingone-prod/lock" \
        -backend-config="unlock_address=$TF_STATE_BASE/pingone-prod/lock" \
        -input=false -reconfigure
    - echo "Applying to PROD (tag=$CI_COMMIT_TAG)..."
    - |
      terraform apply -auto-approve \
        -var-file="${CI_PROJECT_DIR}/environments/prod.tfvars" \
        -input=false -lock=true -lock-timeout=10m
    - echo "PROD deployment complete."
  when: manual
  needs: ["apply_uat", "plan_prod"]
  resource_group: terraform-prod
  only:
    - main
    - tags
  environment:
    name: production
    action: start
  retry:
    max: 1

# =============================================================================
# STAGE 7: DESTROY (manual, dev/qa only — never prod via pipeline)
# =============================================================================

.destroy_template: &destroy_template
  stage: destroy
  script:
    - echo "DESTROY requested for $ENVIRONMENT — proceeding..."
    - source "${CI_PROJECT_DIR}/scripts/fetch-secrets.sh" "$ENVIRONMENT" "$VAULT_ADDR" "$VAULT_ROLE_ID" "$VAULT_SECRET_ID"
    - cd $TF_ROOT
    - |
      terraform init \
        -backend-config="address=$TF_STATE_BASE/pingone-$ENVIRONMENT" \
        -backend-config="lock_address=$TF_STATE_BASE/pingone-$ENVIRONMENT/lock" \
        -backend-config="unlock_address=$TF_STATE_BASE/pingone-$ENVIRONMENT/lock" \
        -input=false -reconfigure
    - |
      terraform destroy -auto-approve \
        -var-file="${CI_PROJECT_DIR}/environments/$ENVIRONMENT.tfvars" \
        -input=false -lock=true -lock-timeout=5m
    - echo "$ENVIRONMENT destroyed."
  when: manual
  only:
    - main

destroy_dev:
  <<: *destroy_template
  variables:
    ENVIRONMENT: "dev"
  needs: ["apply_dev"]
  resource_group: terraform-dev
  environment:
    name: dev
    action: stop
  retry:
    max: 1

destroy_qa:
  <<: *destroy_template
  variables:
    ENVIRONMENT: "qa"
  needs: ["apply_qa"]
  resource_group: terraform-qa
  environment:
    name: qa
    action: stop
  retry:
    max: 1
